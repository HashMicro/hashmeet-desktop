<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Choose what to share</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #1a1a1a; color: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Manrope, sans-serif;
    font-size: 13px; overflow: hidden;
  }
  .wrap { display: flex; flex-direction: column; height: 100%; padding: 20px; box-sizing: border-box; }
  h2 { margin: 0 0 16px; font-size: 16px; font-weight: 600; }
  .tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-shrink: 0; }
  .tab {
    padding: 7px 14px; background: #2a2a2a; border: 1px solid #333;
    border-radius: 6px; cursor: pointer; color: #ccc; font-size: 13px;
    font-family: inherit;
  }
  .tab:hover { background: #333; }
  .tab.active { background: #3b82f6; color: white; border-color: #3b82f6; }
  .grid-wrap { flex: 1; overflow-y: auto; min-height: 0; }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px; padding-right: 4px;
  }
  .source {
    cursor: pointer; border: 2px solid transparent; border-radius: 8px;
    overflow: hidden; background: #242424; transition: border-color .12s, transform .12s;
  }
  .source:hover { border-color: #3b82f6; }
  .source:active { transform: scale(0.98); }
  .source .thumb {
    width: 100%; aspect-ratio: 16 / 10; background: #000;
    display: flex; align-items: center; justify-content: center;
  }
  .source .thumb img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .source .name {
    padding: 8px 10px; font-size: 12px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    border-top: 1px solid #2f2f2f;
  }
  .empty { color: #888; padding: 40px; text-align: center; }
  .footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; flex-shrink: 0; }
  .btn {
    padding: 8px 16px; border-radius: 6px; border: 1px solid #333;
    background: #2a2a2a; color: #f0f0f0; cursor: pointer; font-size: 13px; font-family: inherit;
  }
  .btn:hover { background: #333; }
</style>
</head>
<body>
<div class="wrap">
  <h2>Choose what to share</h2>
  <div class="tabs">
    <button class="tab active" data-type="screen">Entire Screen</button>
    <button class="tab" data-type="window">Window</button>
  </div>
  <div class="grid-wrap"><div class="grid" id="grid"></div></div>
  <div class="footer"><button class="btn" id="cancel">Cancel</button></div>
</div>
<script>
  const { ipcRenderer } = require('electron');
  let sources = [];
  let activeType = 'screen';

  ipcRenderer.on('sources', (_ev, list) => { sources = list; render(); });

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    const filtered = sources.filter(s => s.type === activeType);
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty">No ' + activeType + 's available.</div>';
      return;
    }
    filtered.forEach(src => {
      const el = document.createElement('div');
      el.className = 'source';
      el.tabIndex = 0;
      const thumb = document.createElement('div');
      thumb.className = 'thumb';
      const img = document.createElement('img');
      img.src = src.thumbnail;
      thumb.appendChild(img);
      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = src.name || src.id;
      el.appendChild(thumb); el.appendChild(name);
      el.addEventListener('click', () => select(src.id));
      el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') select(src.id); });
      grid.appendChild(el);
    });
  }

  function select(id) { ipcRenderer.send('picker:select', id); }
  function cancel() { ipcRenderer.send('picker:select', null); }

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeType = tab.dataset.type;
      render();
    });
  });

  document.getElementById('cancel').addEventListener('click', cancel);
  window.addEventListener('keydown', e => { if (e.key === 'Escape') cancel(); });
</script>
</body>
</html>
