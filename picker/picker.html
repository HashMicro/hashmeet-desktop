<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:">
<title>Choose what to share</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #171717;
    --panel: #232323;
    --panel-2: #2d2d2d;
    --border: #3a3a3a;
    --text: #f3f4f6;
    --muted: #a1a1aa;
    --accent: #2563eb;
    --accent-2: #60a5fa;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Manrope, sans-serif;
    font-size: 13px;
    overflow: hidden;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 18px;
    gap: 14px;
  }

  .top {
    display: grid;
    grid-template-columns: minmax(220px, 1fr) minmax(220px, 320px);
    gap: 16px;
    align-items: end;
  }

  h2 {
    margin: 0 0 4px;
    font-size: 18px;
    line-height: 1.2;
    font-weight: 650;
  }

  .subtitle {
    color: var(--muted);
    font-size: 12px;
  }

  .search {
    position: relative;
  }

  .search input {
    width: 100%;
    height: 36px;
    padding: 0 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    outline: none;
    background: var(--panel);
    color: var(--text);
    font: inherit;
  }

  .search input:focus {
    border-color: var(--accent-2);
    box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.18);
  }

  .tabs {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .tabs-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .tab {
    min-width: 128px;
    height: 34px;
    padding: 0 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    color: #d4d4d8;
    font: inherit;
    font-weight: 600;
  }

  .tab:hover { background: var(--panel-2); }

  .tab.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .grid-wrap {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding-right: 4px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 12px;
  }

  .source {
    cursor: pointer;
    border: 2px solid transparent;
    border-radius: 8px;
    overflow: hidden;
    background: var(--panel);
    transition: border-color 120ms, transform 120ms, background 120ms;
  }

  .source:hover,
  .source.focused,
  .source:focus-visible {
    border-color: var(--accent-2);
    background: #282828;
    outline: none;
  }

  .source.selected {
    border-color: var(--accent);
    background: #252d3d;
    box-shadow: 0 0 0 1px var(--accent);
  }

  .source:active { transform: scale(0.99); }

  .thumb {
    width: 100%;
    aspect-ratio: 16 / 10;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .meta {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 8px;
    align-items: center;
    padding: 9px 10px;
    border-top: 1px solid #303030;
  }

  .name {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 12px;
    font-weight: 600;
  }

  .badge {
    border: 1px solid #444;
    border-radius: 999px;
    padding: 2px 7px;
    color: #d4d4d8;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .empty {
    grid-column: 1 / -1;
    color: var(--muted);
    padding: 48px 12px;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: 8px;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    flex-shrink: 0;
    align-items: center;
  }

  .footer-actions,
  .share-options {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .share-options {
    min-width: 0;
    gap: 18px;
  }

  .audio-option {
    display: none;
    align-items: center;
    gap: 8px;
    color: #d4d4d8;
    cursor: pointer;
    font-size: 12px;
  }

  .audio-option.visible { display: flex; }

  .audio-option input {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
  }

  .hint {
    color: var(--muted);
    font-size: 11px;
  }

  .btn {
    min-width: 88px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    cursor: pointer;
    font: inherit;
    font-weight: 600;
  }

  .btn:hover { background: var(--panel-2); }

  .btn:focus-visible,
  .tab:focus-visible {
    outline: 2px solid var(--accent-2);
    outline-offset: 2px;
  }

  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .btn.primary:hover { background: #1d4ed8; }

  .btn:disabled {
    cursor: not-allowed;
    opacity: 0.48;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h2>Choose what to share</h2>
      <div class="subtitle" id="summary" role="status" aria-live="polite">Loading available screens and windows.</div>
    </div>
    <label class="search">
      <input id="search" type="search" placeholder="Search screens or windows" aria-label="Search screens or windows" autocomplete="off">
    </label>
  </div>
  <div class="tabs-actions">
    <div class="tabs" role="tablist" aria-label="Share source type">
      <button class="tab active" data-type="screen" id="tab-screen" role="tab" aria-selected="true" aria-controls="grid" tabindex="0">Entire Screen</button>
      <button class="tab" data-type="window" id="tab-window" role="tab" aria-selected="false" aria-controls="grid" tabindex="-1">Window</button>
    </div>
    <button class="btn" id="refresh" type="button" aria-label="Refresh available screens and windows">Refresh</button>
  </div>
  <div class="grid-wrap"><div class="grid" id="grid" role="listbox" aria-label="Available share sources"></div></div>
  <div class="footer">
    <div class="share-options">
      <div class="hint">Select a source, then choose Share.</div>
      <label class="audio-option" id="audio-option">
        <input id="share-system-audio" type="checkbox">
        <span>Share system audio</span>
      </label>
    </div>
    <div class="footer-actions">
      <button class="btn" id="cancel" type="button">Cancel</button>
      <button class="btn primary" id="share" type="button" disabled>Share</button>
    </div>
  </div>
</div>
<script>
  const pickerAPI = window.pickerAPI;
  const grid = document.getElementById('grid');
  const search = document.getElementById('search');
  const summary = document.getElementById('summary');
  const tabs = Array.from(document.querySelectorAll('.tab'));
  const shareButton = document.getElementById('share');
  const refreshButton = document.getElementById('refresh');
  const audioOption = document.getElementById('audio-option');
  const shareSystemAudio = document.getElementById('share-system-audio');
  let sources = [];
  let capabilities = {};
  let activeType = localStorage.getItem('hashmeet.sharePicker.type') || 'screen';
  let focusedIndex = 0;
  let focusedSourceId = null;
  let selectedId = null;
  let hasLoadedSources = false;
  let lastSourceSignature = '';
  let refreshInFlight = false;
  let refreshTimeout = 0;

  function typeLabel(type) {
    return type === 'screen' ? 'Screen' : 'Window';
  }

  function getFiltered() {
    const query = search.value.trim().toLowerCase();

    return sources.filter(source => {
      const matchesType = source.type === activeType;
      const matchesQuery = !query || String(source.name || source.id).toLowerCase().includes(query);

      return matchesType && matchesQuery;
    });
  }

  function updateTabs() {
    const counts = sources.reduce((acc, source) => {
      acc[source.type] = (acc[source.type] || 0) + 1;

      return acc;
    }, {});

    tabs.forEach(tab => {
      const type = tab.dataset.type;
      const count = counts[type] || 0;

      tab.classList.toggle('active', type === activeType);
      tab.setAttribute('aria-selected', String(type === activeType));
      tab.tabIndex = type === activeType ? 0 : -1;
      tab.textContent = `${type === 'screen' ? 'Entire Screen' : 'Window'} (${count})`;
    });
  }

  function updateSummary(filtered) {
    const total = sources.length;
    const count = filtered.length;
    const suffix = count === 1 ? '' : 's';

    summary.textContent = total
      ? `${count} ${activeType}${suffix} available.`
      : 'No share sources are available.';
  }

  function focusCard(index) {
    const cards = Array.from(grid.querySelectorAll('.source'));

    cards.forEach(card => {
      card.classList.remove('focused');
      card.tabIndex = -1;
    });
    if (!cards.length) return;

    focusedIndex = Math.max(0, Math.min(index, cards.length - 1));
    focusedSourceId = cards[focusedIndex].dataset.sourceId;
    cards[focusedIndex].classList.add('focused');
    cards[focusedIndex].tabIndex = 0;
    cards[focusedIndex].focus({ preventScroll: true });
    cards[focusedIndex].scrollIntoView({ block: 'nearest' });
  }

  function render() {
    const filtered = getFiltered();
    const restoreCardFocus = document.activeElement?.classList?.contains('source');
    const preservedIndex = filtered.findIndex(source => source.id === focusedSourceId);

    focusedIndex = preservedIndex >= 0
      ? preservedIndex
      : Math.max(0, Math.min(focusedIndex, filtered.length - 1));

    updateTabs();
    updateSummary(filtered);
    grid.innerHTML = '';

    if (filtered.length === 0) {
      const empty = document.createElement('div');

      empty.className = 'empty';
      empty.textContent = search.value.trim()
        ? 'No matching sources.'
        : `No ${activeType}s available.`;
      grid.appendChild(empty);
      syncSelectionControls();

      return;
    }

    filtered.forEach((src, index) => {
      const el = document.createElement('div');
      const thumb = document.createElement('div');
      const img = document.createElement('img');
      const meta = document.createElement('div');
      const name = document.createElement('div');
      const badge = document.createElement('span');

      el.className = 'source';
      el.tabIndex = index === focusedIndex ? 0 : -1;
      el.dataset.index = String(index);
      el.dataset.sourceId = src.id;
      el.setAttribute('role', 'option');
      el.setAttribute('aria-label', `${src.name || src.id}, ${typeLabel(src.type)}`);
      el.setAttribute('aria-selected', String(src.id === selectedId));
      el.classList.toggle('selected', src.id === selectedId);
      thumb.className = 'thumb';
      img.src = src.thumbnail;
      img.alt = '';
      meta.className = 'meta';
      name.className = 'name';
      name.title = src.name || src.id;
      name.textContent = src.name || src.id;
      badge.className = 'badge';
      badge.textContent = typeLabel(src.type);

      thumb.appendChild(img);
      meta.appendChild(name);
      meta.appendChild(badge);
      el.appendChild(thumb);
      el.appendChild(meta);
      el.addEventListener('click', () => selectSource(src.id, index));
      el.addEventListener('dblclick', () => {
        selectSource(src.id, index);
        confirmSelection();
      });
      el.addEventListener('keydown', event => {
        if (event.key === ' ') {
          event.preventDefault();
          selectSource(src.id, index);
        }
      });
      el.addEventListener('focus', () => {
        focusedIndex = index;
        focusedSourceId = src.id;
        grid.querySelectorAll('.source').forEach(card => {
          card.classList.remove('focused');
          card.tabIndex = -1;
        });
        el.classList.add('focused');
        el.tabIndex = 0;
      });
      grid.appendChild(el);
    });

    syncSelectionControls();
    if (restoreCardFocus) focusCard(focusedIndex);
  }

  function setActiveType(type) {
    activeType = type;
    focusedIndex = 0;
    focusedSourceId = null;
    localStorage.setItem('hashmeet.sharePicker.type', activeType);
    render();
  }

  function selectSource(id, index) {
    selectedId = id;
    focusedIndex = index;
    focusedSourceId = id;
    grid.querySelectorAll('.source').forEach(card => {
      const selected = card.dataset.sourceId === selectedId;

      card.classList.toggle('selected', selected);
      card.setAttribute('aria-selected', String(selected));
      card.tabIndex = card.dataset.sourceId === focusedSourceId ? 0 : -1;
    });
    syncSelectionControls();
  }

  function refreshRenderedThumbnails() {
    grid.querySelectorAll('.source').forEach(card => {
      const source = sources.find(item => item.id === card.dataset.sourceId);
      const image = card.querySelector('img');

      if (source?.thumbnail && image && image.src !== source.thumbnail) {
        image.src = source.thumbnail;
      }
    });
  }

  function syncSelectionControls() {
    const selected = getFiltered().find(source => source.id === selectedId);
    const audioSupported = capabilities.systemAudio === true
      || capabilities.systemAudio === 'loopback'
      || capabilities.shareSystemAudio === true
      || capabilities.systemAudioSupported === true
      || capabilities.canShareSystemAudio === true
      || capabilities.supportsSystemAudio === true;
    const audioRequested = capabilities.audioRequested !== false;
    const showAudio = pickerAPI.platform === 'win32'
      && audioSupported
      && audioRequested
      && selected?.type === 'screen';

    shareButton.disabled = !selected;
    audioOption.classList.toggle('visible', Boolean(showAudio));
    if (!showAudio) shareSystemAudio.checked = false;
  }

  function confirmSelection() {
    if (!selectedId || !getFiltered().some(source => source.id === selectedId)) return;

    pickerAPI.select({
      sourceId: selectedId,
      shareSystemAudio: audioOption.classList.contains('visible') && shareSystemAudio.checked
    });
  }

  function cancel() {
    pickerAPI.select(null);
  }

  function completeRefresh() {
    refreshInFlight = false;
    refreshButton.disabled = false;
    refreshButton.setAttribute('aria-busy', 'false');
    window.clearTimeout(refreshTimeout);
  }

  function requestRefresh(announce = false) {
    if (refreshInFlight) return;

    refreshInFlight = true;
    refreshButton.disabled = true;
    refreshButton.setAttribute('aria-busy', 'true');
    if (announce) summary.textContent = 'Refreshing available screens and windows.';
    pickerAPI.refresh();
    refreshTimeout = window.setTimeout(() => {
      completeRefresh();
      if (announce) summary.textContent = 'Refresh timed out. Try again.';
    }, 5000);
  }

  tabs.forEach(tab => {
    tab.addEventListener('click', () => setActiveType(tab.dataset.type));
    tab.addEventListener('keydown', event => {
      if (![ 'ArrowLeft', 'ArrowRight' ].includes(event.key)) return;

      const direction = event.key === 'ArrowRight' ? 1 : -1;
      const nextIndex = (tabs.indexOf(tab) + direction + tabs.length) % tabs.length;

      event.preventDefault();
      setActiveType(tabs[nextIndex].dataset.type);
      tabs[nextIndex].focus();
    });
  });

  search.addEventListener('input', () => {
    focusedIndex = 0;
    focusedSourceId = null;
    render();
  });

  document.getElementById('cancel').addEventListener('click', cancel);
  shareButton.addEventListener('click', confirmSelection);
  refreshButton.addEventListener('click', () => requestRefresh(true));
  window.addEventListener('keydown', event => {
    const filtered = getFiltered();
    const sourceHasFocus = document.activeElement?.classList?.contains('source');

    if (event.key === 'Escape') {
      cancel();
      return;
    }

    if (!filtered.length || !sourceHasFocus) return;

    if (event.key === 'Enter') {
      event.preventDefault();
      const focused = filtered[focusedIndex];

      if (focused) {
        if (selectedId !== focused.id) selectSource(focused.id, focusedIndex);
        confirmSelection();
      }
      return;
    }

    if ([ 'ArrowRight', 'ArrowDown', 'ArrowLeft', 'ArrowUp' ].includes(event.key)) {
      const columns = Math.max(1, Math.floor(grid.clientWidth / 222));
      let next = focusedIndex;

      if (event.key === 'ArrowRight') next += 1;
      if (event.key === 'ArrowLeft') next -= 1;
      if (event.key === 'ArrowDown') next += columns;
      if (event.key === 'ArrowUp') next -= columns;

      event.preventDefault();
      focusCard(next);
      return;
    }

    if ([ 'Home', 'End' ].includes(event.key)) {
      event.preventDefault();
      focusCard(event.key === 'Home' ? 0 : filtered.length - 1);
    }
  });

  pickerAPI.onSources(payload => {
    const nextSources = Array.isArray(payload) ? payload : payload?.sources;
    const nextCapabilities = Array.isArray(payload)
      ? {}
      : {
          ...(payload?.metadata || {}),
          ...(payload?.capabilities || {}),
          ...(payload?.request || {})
        };
    const normalizedSources = Array.isArray(nextSources) ? nextSources : [];
    const nextSignature = JSON.stringify(normalizedSources.map(source => [
      source.id,
      source.name,
      source.type,
      source.displayId
    ]));
    const sourcesChanged = nextSignature !== lastSourceSignature;

    completeRefresh();
    sources = normalizedSources;
    capabilities = nextCapabilities && typeof nextCapabilities === 'object' ? nextCapabilities : {};
    if (selectedId && !sources.some(source => source.id === selectedId)) selectedId = null;
    if (!sources.some(source => source.type === activeType)) {
      activeType = sources.some(source => source.type === 'screen') ? 'screen' : 'window';
    }
    if (sourcesChanged || !hasLoadedSources) {
      lastSourceSignature = nextSignature;
      render();
    } else {
      refreshRenderedThumbnails();
      syncSelectionControls();
    }
    if (!hasLoadedSources) {
      hasLoadedSources = true;
      search.focus();
    }
  });
  pickerAPI.onError(payload => {
    completeRefresh();
    summary.textContent = payload?.message || 'Could not refresh share sources.';
  });

  const refreshTimer = window.setInterval(() => {
    const navigatingSources = document.activeElement?.classList?.contains('source');

    if (document.visibilityState === 'visible' && !navigatingSources) requestRefresh(false);
  }, 6000);
  window.addEventListener('beforeunload', () => window.clearInterval(refreshTimer));

  updateTabs();
</script>
</body>
</html>
