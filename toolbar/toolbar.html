<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               style-src 'self' 'unsafe-inline';
               script-src 'self' 'unsafe-inline';
               img-src data:;">
<title>HashMeet Screen Share</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { color-scheme: dark; }

  html,
  body {
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #f4f4f5;
    user-select: none;
    cursor: default;
    -webkit-app-region: drag;
  }

  #hm-toolbar {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
  }

  #hm-toolbar-inner {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: minmax(216px, 1fr) 236px 56px;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: rgba(18, 18, 18, 0.9);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    box-shadow: 0 10px 36px rgba(0, 0, 0, 0.42);
  }

  #hm-tb-context {
    min-width: 0;
    display: grid;
    grid-template-columns: 44px minmax(0, 1fr);
    align-items: center;
    gap: 10px;
  }

  #hm-tb-source-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #242424;
    color: #93c5fd;
    font-size: 22px;
  }

  .bi {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    font-style: normal;
    font-weight: 700;
    line-height: 1;
  }

  .bi::before { display: block; }
  .bi-display::before { content: "▣"; font-size: 19px; }
  .bi-window::before { content: "▤"; font-size: 19px; }
  .bi-bounding-box::before { content: "▣"; font-size: 15px; }
  .bi-reception-4::before { content: "▂▄▆█"; font-size: 11px; }
  .bi-mic-fill::before { content: "●"; font-size: 13px; }
  .bi-mic-mute-fill::before { content: "●╱"; font-size: 13px; }
  .bi-exclamation-triangle-fill::before { content: "⚠"; font-size: 15px; }
  .bi-pause-circle::before { content: "Ⅱ"; font-size: 18px; }
  .bi-play-circle::before { content: "▶"; font-size: 16px; }
  .bi-arrow-left-right::before { content: "⇄"; font-size: 20px; }
  .bi-x-circle-fill::before { content: "×"; font-size: 23px; }
  .bi-people-fill::before { content: "●●"; font-size: 9px; }

  #hm-tb-source-main {
    min-width: 0;
    overflow: hidden;
  }

  #hm-tb-source-name {
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 13px;
    line-height: 1.2;
    font-weight: 700;
  }

  #hm-tb-speaker {
    max-width: 100%;
    margin-top: 3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: rgba(255, 255, 255, 0.62);
    font-size: 11px;
    font-weight: 600;
  }

  #hm-tb-badges {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 6px;
    min-width: 0;
    max-width: 100%;
    overflow: hidden;
  }

  .hm-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    min-width: 0;
    max-width: 96px;
    height: 20px;
    padding: 0 5px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: rgba(255, 255, 255, 0.78);
    background: rgba(255, 255, 255, 0.06);
    font-size: 10px;
    line-height: 20px;
    font-weight: 700;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .hm-chip .bi { width: 12px; height: 12px; }
  #hm-tb-source-type .bi { display: none; }
  #hm-tb-source-type { width: 62px; }
  #hm-tb-quality { width: 96px; max-width: 96px; }
  #hm-tb-quality .bi {
    width: 26px;
    min-width: 26px;
    overflow: hidden;
  }
  #hm-tb-mic { width: 66px; }

  .hm-chip span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #hm-tb-quality.hm-quality-normal { color: #86efac; }
  #hm-tb-quality.hm-quality-degraded { color: #facc15; }
  #hm-tb-quality.hm-quality-unstable,
  #hm-tb-quality.hm-quality-emergency { color: #fb923c; }
  #hm-tb-mic.hm-mic-unavailable { color: #f87171; }

  #hm-tb-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 236px;
    gap: 4px;
    -webkit-app-region: no-drag;
  }

  #hm-tb-controls button {
    width: 56px;
    height: 58px;
    background: transparent;
    border: none;
    border-radius: 10px;
    color: #f4f4f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    transition: background 150ms, color 150ms, outline-color 150ms;
    font-family: inherit;
    white-space: nowrap;
    -webkit-app-region: no-drag;
  }

  #hm-tb-controls button i { font-size: 18px; line-height: 1; }
  #hm-tb-controls button span { font-size: 11px; font-weight: 700; }
  #hm-tb-controls button:hover { background: rgba(255, 255, 255, 0.1); }
  #hm-tb-controls button:disabled {
    opacity: 0.48;
    cursor: wait;
  }
  #hm-tb-controls button:disabled:hover { background: transparent; }
  #hm-tb-controls button:focus-visible {
    outline: 2px solid #93c5fd;
    outline-offset: 1px;
    background: rgba(255, 255, 255, 0.1);
  }
  #hm-tb-stop:hover { background: rgba(239, 68, 68, 0.15) !important; color: #f87171; }
  #hm-tb-pause.hm-tb-paused {
    outline: 1.5px solid rgba(245, 158, 11, 0.72);
    animation: hmTbPulse 2s ease-in-out infinite;
  }

  #hm-tb-meta {
    width: 56px;
    min-width: 56px;
    height: 58px;
    display: grid;
    place-items: center;
    padding-left: 12px;
    border-left: 1px solid rgba(255, 255, 255, 0.1);
  }

  #hm-tb-pcount-wrap {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.7);
  }

  #hm-tb-error {
    position: absolute;
    top: 2px;
    left: 50%;
    z-index: 2;
    max-width: calc(100% - 32px);
    padding: 4px 9px;
    border: 1px solid rgba(248, 113, 113, 0.55);
    border-radius: 6px;
    background: #3f1216;
    color: #fecaca;
    font-size: 11px;
    font-weight: 700;
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transform: translateX(-50%);
    -webkit-app-region: no-drag;
  }

  #hm-tb-error[hidden] { display: none; }

  @keyframes hmTbPulse {
    0%, 100% { outline-color: rgba(245, 158, 11, 0.72); }
    50% { outline-color: rgba(245, 158, 11, 0.24); }
  }

  @media (max-width: 520px) {
    #hm-toolbar-inner {
      grid-template-columns: minmax(0, 1fr);
      gap: 0;
      padding: 10px;
    }
    #hm-tb-context,
    #hm-tb-meta { display: none; }
    #hm-tb-controls {
      width: 100%;
      justify-content: space-around;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    #hm-tb-pause.hm-tb-paused { animation: none; }
    #hm-tb-controls button { transition: none; }
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
</style>
</head>
<body>
<div id="hm-toolbar">
  <div id="hm-toolbar-inner" role="toolbar" aria-label="Screen sharing controls">
    <div id="hm-tb-context">
      <div id="hm-tb-source-icon" aria-hidden="true"><i class="bi bi-display"></i></div>
      <div id="hm-tb-source-main">
        <div id="hm-tb-source-name">Screen sharing</div>
        <div id="hm-tb-speaker"></div>
        <div id="hm-tb-badges">
          <div class="hm-chip" id="hm-tb-source-type"><i class="bi bi-bounding-box" aria-hidden="true"></i><span>Screen</span></div>
          <div class="hm-chip hm-quality-normal" id="hm-tb-quality" role="status" aria-label="Share quality: Normal"><i class="bi bi-reception-4" aria-hidden="true"></i><span>Normal</span></div>
          <div class="hm-chip" id="hm-tb-mic" role="status" aria-label="Microphone available"><i class="bi bi-mic-fill" aria-hidden="true"></i><span>Mic OK</span></div>
        </div>
      </div>
    </div>
    <div id="hm-tb-controls">
      <button id="hm-tb-pause" type="button" title="Pause Screen Share" aria-label="Pause screen share" aria-pressed="false">
        <i class="bi bi-pause-circle" aria-hidden="true"></i><span>Pause</span>
      </button>
      <button id="hm-tb-switch" type="button" title="Switch Shared Screen" aria-label="Switch shared screen">
        <i class="bi bi-arrow-left-right" aria-hidden="true"></i><span>Switch</span>
      </button>
      <button id="hm-tb-mute" type="button" title="Mute Microphone" aria-label="Mute microphone" aria-pressed="false">
        <i class="bi bi-mic-fill" aria-hidden="true"></i><span>Mute</span>
      </button>
      <button id="hm-tb-stop" type="button" title="Stop Sharing" aria-label="Stop sharing">
        <i class="bi bi-x-circle-fill" aria-hidden="true"></i><span>Stop</span>
      </button>
    </div>
    <div id="hm-tb-error" role="alert" hidden></div>
    <div id="hm-tb-meta">
      <div id="hm-tb-pcount-wrap" aria-label="Participants">
        <i class="bi bi-people-fill" aria-hidden="true"></i>
        <span id="hm-tb-pcount">0</span>
      </div>
    </div>
  </div>
  <div id="hm-tb-live-status" class="sr-only" role="status" aria-live="polite"></div>
</div>
<script>
(() => {
  'use strict';

  const toolbarBridge = window.toolbarAPI;

  if (!toolbarBridge) {
    const error = document.getElementById('hm-tb-error');

    error.textContent = 'Toolbar controls are unavailable.';
    error.hidden = false;
    document.querySelectorAll('#hm-tb-controls button').forEach(button => {
      button.disabled = true;
    });
    return;
  }

  function recordToolbarDiagnostic(type, payload = {}) {
    try {
      toolbarBridge.recordDiagnostic(type, payload);
    } catch (_) {
      // Diagnostics must never break the toolbar.
    }
  }

  window.addEventListener('error', (event) => {
    recordToolbarDiagnostic('error', {
      message: event.message,
      filename: event.filename,
      lineno: event.lineno,
      colno: event.colno
    });
  });

  window.addEventListener('unhandledrejection', (event) => {
    recordToolbarDiagnostic('unhandled-rejection', {
      reason: event.reason?.message || String(event.reason || 'unknown')
    });
  });

  const state = {
    isSharePaused: false,
    isMuted: false,
    pauseSupported: false,
    micAvailable: true,
    participantCount: 0,
    speakerName: '',
    speakerInitials: '',
    sourceName: 'Screen sharing',
    sourceType: 'screen',
    qualityStage: 'normal'
  };
  const pendingActions = new Set();
  let errorTimer = null;

  function $(id) { return document.getElementById(id); }

  function titleCase(value) {
    const text = String(value || '').trim();

    if (!text) return '';

    return text.charAt(0).toUpperCase() + text.slice(1);
  }

  function normalizeQualityStage(value) {
    return String(value || 'normal').trim().toLowerCase().replace(/[^a-z0-9-]/g, '-');
  }

  function renderSource() {
    const sourceType = state.sourceType === 'window' ? 'window' : 'screen';
    const icon = $('hm-tb-source-icon').querySelector('i');
    const typeChip = $('hm-tb-source-type');

    $('hm-tb-source-name').textContent = state.sourceName || 'Screen sharing';
    icon.className = sourceType === 'window' ? 'bi bi-window' : 'bi bi-display';
    typeChip.querySelector('i').className = sourceType === 'window' ? 'bi bi-window' : 'bi bi-display';
    typeChip.querySelector('span').textContent = titleCase(sourceType);
  }

  function renderQuality() {
    const quality = normalizeQualityStage(state.qualityStage);
    const chip = $('hm-tb-quality');

    chip.className = `hm-chip hm-quality-${quality}`;
    chip.querySelector('span').textContent = titleCase(quality);
    chip.setAttribute('aria-label', `Share quality: ${titleCase(quality)}`);
  }

  function renderMicAvailability() {
    const chip = $('hm-tb-mic');
    const available = state.micAvailable !== false;

    chip.classList.toggle('hm-mic-unavailable', !available);
    chip.querySelector('i').className = available ? 'bi bi-mic-fill' : 'bi bi-exclamation-triangle-fill';
    chip.querySelector('span').textContent = available ? 'Mic OK' : 'Mic Issue';
    chip.setAttribute('aria-label', available ? 'Microphone available' : 'Microphone unavailable');
  }

  function renderPause() {
    const btn = $('hm-tb-pause');
    const icon = btn.querySelector('i');
    const label = btn.querySelector('span');

    if (state.isSharePaused) {
      btn.classList.add('hm-tb-paused');
      btn.title = 'Resume Screen Share';
      btn.setAttribute('aria-label', 'Resume screen share');
      btn.setAttribute('aria-pressed', 'true');
      icon.className = 'bi bi-play-circle';
      label.textContent = 'Resume';
    } else {
      btn.classList.remove('hm-tb-paused');
      btn.title = 'Pause Screen Share';
      btn.setAttribute('aria-label', 'Pause screen share');
      btn.setAttribute('aria-pressed', 'false');
      icon.className = 'bi bi-pause-circle';
      label.textContent = 'Pause';
    }

    if (state.pauseSupported !== true) {
      btn.title = 'Pause requires the latest meeting server';
      btn.setAttribute('aria-label', 'Pause screen share unavailable');
    }
  }

  function renderMute() {
    const btn = $('hm-tb-mute');
    const icon = btn.querySelector('i');
    const label = btn.querySelector('span');

    icon.className = state.isMuted ? 'bi bi-mic-mute-fill' : 'bi bi-mic-fill';
    label.textContent = state.isMuted ? 'Unmute' : 'Mute';
    btn.title = state.isMuted ? 'Unmute Microphone' : 'Mute Microphone';
    btn.setAttribute('aria-label', state.isMuted ? 'Unmute microphone' : 'Mute microphone');
    btn.setAttribute('aria-pressed', String(state.isMuted));
  }

  function renderCount() {
    $('hm-tb-pcount').textContent = String(state.participantCount || 0);
    $('hm-tb-pcount-wrap').setAttribute('aria-label', `${state.participantCount || 0} participants`);
  }

  function renderSpeaker() {
    $('hm-tb-speaker').textContent = state.speakerName ? `Speaking: ${state.speakerName}` : '';
  }

  function renderPending() {
    const anyPending = pendingActions.size > 0;

    for (const action of ['pause', 'switch', 'mute', 'stop']) {
      const button = $(`hm-tb-${action}`);
      const pending = pendingActions.has(action);
      const unsupported = action === 'pause' && state.pauseSupported !== true;

      button.disabled = anyPending || unsupported;
      button.setAttribute('aria-busy', String(pending));
    }
  }

  function showCommandError(message) {
    const error = $('hm-tb-error');

    window.clearTimeout(errorTimer);
    error.textContent = String(message || 'Screen-share command failed.');
    error.hidden = false;
    errorTimer = window.setTimeout(() => {
      error.hidden = true;
      error.textContent = '';
    }, 6000);
  }

  function renderAll() {
    renderSource();
    renderQuality();
    renderMicAvailability();
    renderPause();
    renderMute();
    renderCount();
    renderSpeaker();
    renderPending();
  }

  function applyPatch(patch) {
    if (!patch) return;
    const wasPaused = state.isSharePaused;
    const wasMuted = state.isMuted;
    Object.assign(state, patch);
    renderAll();
    if (wasPaused !== state.isSharePaused) {
      $('hm-tb-live-status').textContent = state.isSharePaused ? 'Screen share paused' : 'Screen share resumed';
    } else if (wasMuted !== state.isMuted) {
      $('hm-tb-live-status').textContent = state.isMuted ? 'Microphone muted' : 'Microphone unmuted';
    }
  }

  toolbarBridge.onInit(snapshot => applyPatch(snapshot));
  toolbarBridge.onState(patch => applyPatch(patch));

  async function runToolbarAction(action) {
    if (pendingActions.size > 0) return;

    pendingActions.add(action);
    renderPending();

    try {
      const result = await toolbarBridge.action(action);

      if (!result?.ok) {
        showCommandError(result?.error);
        recordToolbarDiagnostic('command-failed', { action, error: result?.error });
        return;
      }

      if (result.state) applyPatch(result.state);
      recordToolbarDiagnostic('command-completed', { action });
    } catch (error) {
      showCommandError(error?.message);
      recordToolbarDiagnostic('command-error', { action, error: error?.message });
    } finally {
      pendingActions.delete(action);
      renderPending();
    }
  }

  for (const action of ['pause', 'switch', 'mute', 'stop']) {
    $(`hm-tb-${action}`).addEventListener('click', () => runToolbarAction(action));
  }

  window.addEventListener('keydown', event => {
    if (event.key !== 'Escape') return;

    event.preventDefault();
    toolbarBridge.returnFocusToMeeting();
  });

  renderAll();
  recordToolbarDiagnostic('ready', {
    href: window.location.href,
    userAgent: navigator.userAgent
  });
})();
</script>
</body>
</html>
