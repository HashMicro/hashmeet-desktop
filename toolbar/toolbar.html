<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline';
               style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.bunny.net;
               font-src https://cdn.jsdelivr.net https://fonts.bunny.net data:;
               connect-src https://cdn.jsdelivr.net https://fonts.bunny.net;
               img-src data:;">
<title>HashMeet Screen Share</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=manrope:400,500,600,700" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{color-scheme:dark}
  html,body{
    margin:0;padding:0;height:100%;
    background:transparent;overflow:hidden;
    font-family:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:#ececec;
    user-select:none;
    cursor:default;
    -webkit-app-region:drag;
  }
  #hm-toolbar{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    padding:8px;
  }
  #hm-toolbar-inner{
    display:flex;align-items:center;gap:12px;
    padding:8px 16px;
    background:rgba(15,15,15,0.85);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
    font-family:'Manrope',sans-serif;
    color:#ececec;
  }
  #hm-tb-video{position:relative;width:80px;height:52px;border-radius:8px;overflow:hidden;background:#2a2a2a;flex-shrink:0}
  #hm-tb-avatar{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#2a2a2a;font-size:18px;font-weight:700;color:rgba(255,255,255,0.6)}
  #hm-tb-speaker{position:absolute;bottom:0;left:0;right:0;padding:1px 4px;font-size:9px;font-weight:600;color:#fff;background:rgba(0,0,0,0.6);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #hm-tb-controls{display:flex;align-items:center;gap:2px;-webkit-app-region:no-drag}
  #hm-tb-controls button{background:transparent;border:none;color:#ececec;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border-radius:8px;cursor:pointer;transition:background 150ms;font-family:inherit;white-space:nowrap;-webkit-app-region:no-drag}
  #hm-tb-controls button i{font-size:18px}
  #hm-tb-controls button span{font-size:10px;font-weight:600}
  #hm-tb-controls button:hover{background:rgba(255,255,255,0.1)}
  #hm-tb-stop:hover{background:rgba(239,68,68,0.15)!important;color:#f87171}
  #hm-tb-pause.hm-tb-paused{outline:1.5px solid rgba(245,158,11,0.7);animation:hmTbPulse 2s ease-in-out infinite}
  @keyframes hmTbPulse{0%,100%{outline-color:rgba(245,158,11,0.7)}50%{outline-color:rgba(245,158,11,0.25)}}
  #hm-tb-pcount-wrap{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.6);padding-left:8px;border-left:1px solid rgba(255,255,255,0.1)}
</style>
</head>
<body>
<div id="hm-toolbar">
  <div id="hm-toolbar-inner">
    <div id="hm-tb-video">
      <div id="hm-tb-avatar"><span id="hm-tb-initials"></span></div>
      <span id="hm-tb-speaker"></span>
    </div>
    <div id="hm-tb-controls">
      <button id="hm-tb-pause" type="button" title="Pause Screen Share">
        <i class="bi bi-pause-circle"></i><span>Pause</span>
      </button>
      <button id="hm-tb-mute" type="button" title="Mute">
        <i class="bi bi-mic-fill"></i><span>Mute</span>
      </button>
      <button id="hm-tb-stop" type="button" title="Stop Sharing">
        <i class="bi bi-x-circle-fill"></i><span>Stop</span>
      </button>
    </div>
    <div id="hm-tb-pcount-wrap">
      <i class="bi bi-people-fill"></i>
      <span id="hm-tb-pcount">0</span>
    </div>
  </div>
</div>
<script>
  const { ipcRenderer } = require('electron');

  const state = {
    isSharePaused: false,
    isMuted: false,
    participantCount: 0,
    speakerName: '',
    speakerInitials: ''
  };

  function $(id) { return document.getElementById(id); }

  function renderPause() {
    const btn = $('hm-tb-pause');
    const icon = btn.querySelector('i');
    const label = btn.querySelector('span');
    if (state.isSharePaused) {
      btn.classList.add('hm-tb-paused');
      btn.title = 'Resume Screen Share';
      icon.className = 'bi bi-play-circle';
      label.textContent = 'Resume';
    } else {
      btn.classList.remove('hm-tb-paused');
      btn.title = 'Pause Screen Share';
      icon.className = 'bi bi-pause-circle';
      label.textContent = 'Pause';
    }
  }

  function renderMute() {
    const btn = $('hm-tb-mute');
    const icon = btn.querySelector('i');
    const label = btn.querySelector('span');
    icon.className = state.isMuted ? 'bi bi-mic-mute-fill' : 'bi bi-mic-fill';
    label.textContent = state.isMuted ? 'Unmute' : 'Mute';
    btn.title = state.isMuted ? 'Unmute Microphone' : 'Mute Microphone';
  }

  function renderCount() {
    $('hm-tb-pcount').textContent = String(state.participantCount || 0);
  }

  function renderSpeaker() {
    $('hm-tb-speaker').textContent = state.speakerName || '';
    $('hm-tb-initials').textContent = state.speakerInitials || '';
  }

  function renderAll() {
    renderPause();
    renderMute();
    renderCount();
    renderSpeaker();
  }

  function applyPatch(patch) {
    if (!patch) return;
    Object.assign(state, patch);
    renderAll();
  }

  ipcRenderer.on('toolbar:init', (_ev, snapshot) => applyPatch(snapshot));
  ipcRenderer.on('toolbar:state', (_ev, patch) => applyPatch(patch));

  $('hm-tb-pause').addEventListener('click', () => {
    ipcRenderer.send('toolbar:action', { action: 'pause' });
  });
  $('hm-tb-mute').addEventListener('click', () => {
    ipcRenderer.send('toolbar:action', { action: 'mute' });
  });
  $('hm-tb-stop').addEventListener('click', () => {
    ipcRenderer.send('toolbar:action', { action: 'stop' });
  });

  renderAll();
</script>
</body>
</html>
