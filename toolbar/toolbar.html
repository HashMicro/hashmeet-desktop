<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               style-src 'self' 'unsafe-inline';
               script-src 'self' 'unsafe-inline';
               img-src data:;">
<title>HashMeet Screen Share</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { color-scheme: dark; }

  html,
  body {
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #f4f4f5;
    user-select: none;
    cursor: default;
    -webkit-app-region: drag;
  }

  #hm-toolbar {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
  }

  #hm-toolbar-inner {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: minmax(216px, 1fr) 236px 56px;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: rgba(18, 18, 18, 0.9);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    box-shadow: 0 10px 36px rgba(0, 0, 0, 0.42);
  }

  #hm-tb-context {
    min-width: 0;
    display: grid;
    grid-template-columns: 44px minmax(0, 1fr);
    align-items: center;
    gap: 10px;
  }

  #hm-tb-source-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #242424;
    color: #93c5fd;
    font-size: 22px;
  }

  .bi {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 1.1em;
    font-style: normal;
    font-weight: 800;
    line-height: 1;
  }

  .bi-display::before { content: "[]"; }
  .bi-window::before { content: "[ ]"; }
  .bi-bounding-box::before { content: "[]"; }
  .bi-reception-4::before { content: "||||"; font-size: 0.72em; letter-spacing: 0; }
  .bi-mic-fill::before { content: "M"; }
  .bi-mic-mute-fill::before { content: "M/"; }
  .bi-exclamation-triangle-fill::before { content: "!"; }
  .bi-pause-circle::before { content: "II"; }
  .bi-play-circle::before { content: ">"; }
  .bi-arrow-left-right::before { content: "<>"; }
  .bi-x-circle-fill::before { content: "X"; }
  .bi-people-fill::before { content: "#"; }

  #hm-tb-source-main {
    min-width: 0;
    overflow: hidden;
  }

  #hm-tb-source-name {
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 13px;
    line-height: 1.2;
    font-weight: 700;
  }

  #hm-tb-speaker {
    max-width: 100%;
    margin-top: 3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: rgba(255, 255, 255, 0.62);
    font-size: 10px;
    font-weight: 600;
  }

  #hm-tb-badges {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 6px;
    min-width: 0;
    max-width: 100%;
    overflow: hidden;
  }

  .hm-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    min-width: 0;
    max-width: 96px;
    height: 20px;
    padding: 0 7px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: rgba(255, 255, 255, 0.78);
    background: rgba(255, 255, 255, 0.06);
    font-size: 9px;
    line-height: 20px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .hm-chip span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #hm-tb-quality.hm-quality-normal { color: #86efac; }
  #hm-tb-quality.hm-quality-degraded { color: #facc15; }
  #hm-tb-quality.hm-quality-unstable,
  #hm-tb-quality.hm-quality-emergency { color: #fb923c; }
  #hm-tb-mic.hm-mic-unavailable { color: #f87171; }

  #hm-tb-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 236px;
    gap: 4px;
    -webkit-app-region: no-drag;
  }

  #hm-tb-controls button {
    width: 56px;
    height: 58px;
    background: transparent;
    border: none;
    border-radius: 10px;
    color: #f4f4f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    transition: background 150ms, color 150ms, outline-color 150ms;
    font-family: inherit;
    white-space: nowrap;
    -webkit-app-region: no-drag;
  }

  #hm-tb-controls button i { font-size: 18px; line-height: 1; }
  #hm-tb-controls button span { font-size: 9px; font-weight: 700; }
  #hm-tb-controls button:hover { background: rgba(255, 255, 255, 0.1); }
  #hm-tb-stop:hover { background: rgba(239, 68, 68, 0.15) !important; color: #f87171; }
  #hm-tb-pause.hm-tb-paused {
    outline: 1.5px solid rgba(245, 158, 11, 0.72);
    animation: hmTbPulse 2s ease-in-out infinite;
  }

  #hm-tb-meta {
    width: 56px;
    min-width: 56px;
    height: 58px;
    display: grid;
    place-items: center;
    padding-left: 12px;
    border-left: 1px solid rgba(255, 255, 255, 0.1);
  }

  #hm-tb-pcount-wrap {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.7);
  }

  @keyframes hmTbPulse {
    0%, 100% { outline-color: rgba(245, 158, 11, 0.72); }
    50% { outline-color: rgba(245, 158, 11, 0.24); }
  }
</style>
</head>
<body>
<div id="hm-toolbar">
  <div id="hm-toolbar-inner">
    <div id="hm-tb-context">
      <div id="hm-tb-source-icon"><i class="bi bi-display"></i></div>
      <div id="hm-tb-source-main">
        <div id="hm-tb-source-name">Screen sharing</div>
        <div id="hm-tb-speaker"></div>
        <div id="hm-tb-badges">
          <div class="hm-chip" id="hm-tb-source-type"><i class="bi bi-bounding-box"></i><span>Screen</span></div>
          <div class="hm-chip hm-quality-normal" id="hm-tb-quality"><i class="bi bi-reception-4"></i><span>Normal</span></div>
          <div class="hm-chip" id="hm-tb-mic"><i class="bi bi-mic-fill"></i><span>Mic OK</span></div>
        </div>
      </div>
    </div>
    <div id="hm-tb-controls">
      <button id="hm-tb-pause" type="button" title="Pause Screen Share">
        <i class="bi bi-pause-circle"></i><span>Pause</span>
      </button>
      <button id="hm-tb-switch" type="button" title="Switch Shared Screen">
        <i class="bi bi-arrow-left-right"></i><span>Switch</span>
      </button>
      <button id="hm-tb-mute" type="button" title="Mute Microphone">
        <i class="bi bi-mic-fill"></i><span>Mute</span>
      </button>
      <button id="hm-tb-stop" type="button" title="Stop Sharing">
        <i class="bi bi-x-circle-fill"></i><span>Stop</span>
      </button>
    </div>
    <div id="hm-tb-meta">
      <div id="hm-tb-pcount-wrap">
        <i class="bi bi-people-fill"></i>
        <span id="hm-tb-pcount">0</span>
      </div>
    </div>
  </div>
</div>
<script>
  const { ipcRenderer } = require('electron');

  function recordToolbarDiagnostic(type, payload = {}) {
    try {
      ipcRenderer.send('diagnostics:record', {
        type: `toolbar-${type}`,
        payload
      });
    } catch (_) {
      // Diagnostics must never break the toolbar.
    }
  }

  window.addEventListener('error', (event) => {
    recordToolbarDiagnostic('error', {
      message: event.message,
      filename: event.filename,
      lineno: event.lineno,
      colno: event.colno
    });
  });

  window.addEventListener('unhandledrejection', (event) => {
    recordToolbarDiagnostic('unhandled-rejection', {
      reason: event.reason?.message || String(event.reason || 'unknown')
    });
  });

  const state = {
    isSharePaused: false,
    isMuted: false,
    micAvailable: true,
    participantCount: 0,
    speakerName: '',
    speakerInitials: '',
    sourceName: 'Screen sharing',
    sourceType: 'screen',
    qualityStage: 'normal'
  };

  function $(id) { return document.getElementById(id); }

  function titleCase(value) {
    const text = String(value || '').trim();

    if (!text) return '';

    return text.charAt(0).toUpperCase() + text.slice(1);
  }

  function normalizeQualityStage(value) {
    return String(value || 'normal').trim().toLowerCase().replace(/[^a-z0-9-]/g, '-');
  }

  function renderSource() {
    const sourceType = state.sourceType === 'window' ? 'window' : 'screen';
    const icon = $('hm-tb-source-icon').querySelector('i');
    const typeChip = $('hm-tb-source-type');

    $('hm-tb-source-name').textContent = state.sourceName || 'Screen sharing';
    icon.className = sourceType === 'window' ? 'bi bi-window' : 'bi bi-display';
    typeChip.querySelector('i').className = sourceType === 'window' ? 'bi bi-window' : 'bi bi-display';
    typeChip.querySelector('span').textContent = titleCase(sourceType);
  }

  function renderQuality() {
    const quality = normalizeQualityStage(state.qualityStage);
    const chip = $('hm-tb-quality');

    chip.className = `hm-chip hm-quality-${quality}`;
    chip.querySelector('span').textContent = titleCase(quality);
  }

  function renderMicAvailability() {
    const chip = $('hm-tb-mic');
    const available = state.micAvailable !== false;

    chip.classList.toggle('hm-mic-unavailable', !available);
    chip.querySelector('i').className = available ? 'bi bi-mic-fill' : 'bi bi-exclamation-triangle-fill';
    chip.querySelector('span').textContent = available ? 'Mic OK' : 'Mic Issue';
  }

  function renderPause() {
    const btn = $('hm-tb-pause');
    const icon = btn.querySelector('i');
    const label = btn.querySelector('span');

    if (state.isSharePaused) {
      btn.classList.add('hm-tb-paused');
      btn.title = 'Resume Screen Share';
      icon.className = 'bi bi-play-circle';
      label.textContent = 'Resume';
    } else {
      btn.classList.remove('hm-tb-paused');
      btn.title = 'Pause Screen Share';
      icon.className = 'bi bi-pause-circle';
      label.textContent = 'Pause';
    }
  }

  function renderMute() {
    const btn = $('hm-tb-mute');
    const icon = btn.querySelector('i');
    const label = btn.querySelector('span');

    icon.className = state.isMuted ? 'bi bi-mic-mute-fill' : 'bi bi-mic-fill';
    label.textContent = state.isMuted ? 'Unmute' : 'Mute';
    btn.title = state.isMuted ? 'Unmute Microphone' : 'Mute Microphone';
  }

  function renderCount() {
    $('hm-tb-pcount').textContent = String(state.participantCount || 0);
  }

  function renderSpeaker() {
    $('hm-tb-speaker').textContent = state.speakerName ? `Speaking: ${state.speakerName}` : '';
  }

  function renderAll() {
    renderSource();
    renderQuality();
    renderMicAvailability();
    renderPause();
    renderMute();
    renderCount();
    renderSpeaker();
  }

  function applyPatch(patch) {
    if (!patch) return;
    Object.assign(state, patch);
    renderAll();
  }

  ipcRenderer.on('toolbar:init', (_ev, snapshot) => applyPatch(snapshot));
  ipcRenderer.on('toolbar:state', (_ev, patch) => applyPatch(patch));

  $('hm-tb-pause').addEventListener('click', () => {
    ipcRenderer.send('toolbar:action', { action: 'pause' });
  });
  $('hm-tb-switch').addEventListener('click', () => {
    ipcRenderer.send('toolbar:action', { action: 'switch' });
  });
  $('hm-tb-mute').addEventListener('click', () => {
    ipcRenderer.send('toolbar:action', { action: 'mute' });
  });
  $('hm-tb-stop').addEventListener('click', () => {
    ipcRenderer.send('toolbar:action', { action: 'stop' });
  });

  renderAll();
  recordToolbarDiagnostic('ready', {
    href: window.location.href,
    userAgent: navigator.userAgent
  });
</script>
</body>
</html>
