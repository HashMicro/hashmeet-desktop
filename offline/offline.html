<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HashMeet is offline</title>
  <style>
    :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #171717; color: #f4f4f5; padding: 32px; }
    main { width: min(520px, 100%); text-align: center; }
    .icon { width: 56px; height: 56px; margin: 0 auto 22px; display: grid; place-items: center; border: 1px solid #3f3f46; border-radius: 8px; background: #242424; color: #93c5fd; font-size: 28px; }
    h1 { margin: 0 0 10px; font-size: 24px; letter-spacing: 0; }
    p { margin: 0 auto 24px; max-width: 440px; color: #a1a1aa; line-height: 1.55; }
    .actions { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    button { min-height: 40px; padding: 0 16px; border-radius: 6px; border: 1px solid #52525b; background: #27272a; color: #fafafa; font: inherit; font-weight: 650; cursor: pointer; }
    button.primary { background: #2563eb; border-color: #2563eb; }
    button:hover { filter: brightness(1.12); }
    button:focus-visible { outline: 3px solid #60a5fa; outline-offset: 2px; }
    #status { min-height: 22px; margin-top: 18px; font-size: 13px; color: #a1a1aa; }
  </style>
</head>
<body>
  <main>
    <div class="icon" aria-hidden="true">!</div>
    <h1>HashMeet could not connect</h1>
    <p>Check your internet connection or VPN, then retry. Your diagnostic report can help support identify connection and desktop permission problems.</p>
    <div class="actions">
      <button class="primary" id="retry" type="button">Retry</button>
      <button id="diagnostics" type="button">Copy diagnostics</button>
    </div>
    <div id="status" role="status" aria-live="polite"></div>
  </main>
  <script>
    const status = document.getElementById('status');
    document.getElementById('retry').addEventListener('click', () => {
      status.textContent = 'Reconnecting...';
      window.jitsiNodeAPI?.offline?.retry();
    });
    document.getElementById('diagnostics').addEventListener('click', async () => {
      const result = await window.jitsiNodeAPI?.offline?.copyDiagnostics();
      status.textContent = result?.ok ? 'Diagnostics copied.' : 'Could not copy diagnostics.';
    });
  </script>
</body>
</html>
