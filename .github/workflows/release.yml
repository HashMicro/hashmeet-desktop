name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Install
        run: npm ci
      - name: Verify
        run: npm run verify
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Configure optional macOS signing
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "${MAC_CSC_LINK}" && -n "${MAC_CSC_KEY_PASSWORD}" ]]; then
            {
              echo "CSC_LINK<<EOF"
              echo "${MAC_CSC_LINK}"
              echo "EOF"
              echo "CSC_KEY_PASSWORD=${MAC_CSC_KEY_PASSWORD}"
            } >> "${GITHUB_ENV}"

            if [[ -n "${APPLE_ID_SECRET}" && -n "${APPLE_APP_SPECIFIC_PASSWORD_SECRET}" && -n "${APPLE_TEAM_ID_SECRET}" ]]; then
              {
                echo "APPLE_ID=${APPLE_ID_SECRET}"
                echo "APPLE_APP_SPECIFIC_PASSWORD=${APPLE_APP_SPECIFIC_PASSWORD_SECRET}"
                echo "APPLE_TEAM_ID=${APPLE_TEAM_ID_SECRET}"
              } >> "${GITHUB_ENV}"
            fi
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "${GITHUB_ENV}"
          fi
      - name: Build & package (publish on tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npm run dist -- --mac --publish always
          else
            npm run dist -- --mac --publish never
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: mac-binaries
          path: |
            dist/HashMeet-*.dmg
            dist/HashMeet-*.zip
            dist/latest-mac.yml

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Install
        run: npm ci
      - name: Verify
        run: npm run verify
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Configure optional Windows signing
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        shell: bash
        run: |
          if [[ -n "${WIN_CSC_LINK}" && -n "${WIN_CSC_KEY_PASSWORD}" ]]; then
            {
              echo "CSC_LINK<<EOF"
              echo "${WIN_CSC_LINK}"
              echo "EOF"
              echo "CSC_KEY_PASSWORD=${WIN_CSC_KEY_PASSWORD}"
            } >> "${GITHUB_ENV}"
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "${GITHUB_ENV}"
          fi
      - name: Build & package (publish on tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npm run dist -- --win --publish always
          else
            npm run dist -- --win --publish never
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: windows-binaries
          path: |
            dist/HashMeet-*.exe
            dist/latest.yml

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Install
        run: npm ci
      - name: Verify
        run: npm run verify
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Build & package (publish on tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npm run dist -- --linux --publish always
          else
            npm run dist -- --linux --publish never
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            dist/HashMeet-*.AppImage
            dist/HashMeet-*.deb
            dist/latest-linux.yml
