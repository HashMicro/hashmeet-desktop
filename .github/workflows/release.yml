name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-mac:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Install
        run: npm ci
      - name: Build & package (publish on tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npm run dist -- --publish always
          else
            npm run dist -- --publish never
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: mac-binaries
          path: |
            dist/HashMeet-*.dmg
            dist/HashMeet-*.zip
            dist/latest-mac.yml

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Install
        run: npm ci
      - name: Build & package (publish on tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npm run dist -- --publish always
          else
            npm run dist -- --publish never
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: windows-binaries
          path: |
            dist/HashMeet-*.exe
            dist/latest.yml
